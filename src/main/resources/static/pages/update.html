<!DOCTYPE html>
<html>

<head>
    <title>Update Post</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .form-card {
            max-width: 600px;
            margin: auto;
        }
    </style>
</head>

<body class="container mt-5">

    <div class="form-card">

        <h2 class="mb-4 text-center">Update Post</h2>

        <div class="card shadow-sm">
            <div class="card-body">

                <div class="mb-3">
                    <label class="form-label">Author</label>
                    <input id="author" class="form-control">
                </div>

                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input id="password" type="password" class="form-control"
                        placeholder="Masukkan password untuk update">
                </div>

                <div class="mb-3">
                    <label class="form-label">Title</label>
                    <input id="title" class="form-control">
                </div>

                <div class="mb-3">
                    <label class="form-label">Content</label>
                    <textarea id="content" rows="5" class="form-control"></textarea>
                </div>

                <div class="d-flex justify-content-between">
                    <a href="list.html" class="btn btn-secondary">Back</a>
                    <button id="btnUpdate" onclick="updatePost()" class="btn btn-warning">Update</button>
                </div>

            </div>
        </div>

    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <script>
        const id = new URLSearchParams(window.location.search).get("id");

        function loadData() {

            if (!id) {
                alert("ID tidak valid");
                return;
            }

            $.get(`http://localhost:8080/api/post/get-by-no-view/${id}`, function (res) {

                if (!res.data) {
                    alert("Data tidak ditemukan");
                    return;
                }

                let d = res.data;

                $("#author").val(d.author);
                $("#title").val(d.title);
                $("#content").val(d.content);
            });
        }

        function updatePost() {

            const author = $("#author").val().trim();
            const password = $("#password").val().trim();
            const title = $("#title").val().trim();
            const content = $("#content").val().trim();

            if (!password) {
                alert("Password wajib diisi untuk update");
                return;
            }

            if (author.length > 10) {
                alert("Author max 10 karakter");
                return;
            }

            if (title.length > 100) {
                alert("Title max 100 karakter");
                return;
            }

            if (!/^[a-zA-Z0-9 ]+$/.test(author)) {
                alert("Author hanya boleh huruf & angka");
                return;
            }

            $("#btnUpdate").prop("disabled", true).text("Updating...");

            $.ajax({
                url: `http://localhost:8080/api/post/update/${id}`,
                type: "PUT",
                contentType: "application/json",
                data: JSON.stringify({
                    author,
                    password,
                    title,
                    content
                }),

                success: function (res) {

                    if (res.code !== "0000") {
                        alert(res.message);
                        $("#btnUpdate").prop("disabled", false).text("Update");
                        return;
                    }

                    alert("Post berhasil diupdate!");

                    setTimeout(() => {
                        window.location.href = "list.html";
                    }, 300);
                },
                error: function () {
                    alert("Terjadi error di server");
                    $("#btnUpdate").prop("disabled", false).text("Update");
                }
            });
        }

        loadData();
    </script>

</body>

</html>
