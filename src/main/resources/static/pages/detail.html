<!DOCTYPE html>
<html>

<head>
    <title>Detail Post</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .detail-card {
            max-width: 700px;
            margin: auto;
        }

        .content {
            white-space: pre-line;
        }
    </style>
</head>

<body class="container mt-5">

    <div class="detail-card">

        <h2 class="mb-4 text-center">Detail Post</h2>

        <div class="card shadow-sm mb-3">
            <div class="card-body">

                <div class="d-flex justify-content-between align-items-start">
                    <h4 id="title" class="fw-bold text-primary"></h4>
                    <span class="badge bg-secondary"><span id="views"></span></span>
                </div>

                <div class="text-muted mb-2">
                    <span id="author"></span>
                </div>

                <hr>

                <p id="content" class="content"></p>

                <hr>

                <small class="text-muted">
                    Nomor post: <span id="numberPost"></span><br>
                    tanggal dibuat: <span id="createdAt"></span><br>
                    tanggal diupdate: <span id="updatedAt"></span>
                </small>

            </div>
        </div>

        <div class="d-flex justify-content-between">
            <a href="list.html" class="btn btn-secondary">Kembali</a>

            <div>
                <button onclick="goUpdate()" class="btn btn-warning">Edit</button>
                <button onclick="deletePost()" class="btn btn-danger">Hapus</button>
            </div>
        </div>

    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <script>
        const id = new URLSearchParams(window.location.search).get("id");

        function loadDetail() {

            if (!id) {
                alert("ID tidak valid");
                return;
            }

            $.get(`http://localhost:8080/api/post/get-by/${id}`, function (res) {

                if (!res.data) {
                    $(".detail-card").html("<p class='text-center'>Data tidak ditemukan</p>");
                    return;
                }

                let d = res.data;

                $("#title").text(d.title);
                $("#author").text(d.author);
                $("#views").text(d.views);
                $("#content").text(d.content);
                $("#numberPost").text(d.numberPost);

                $("#createdAt").text(new Date(d.createdAt).toLocaleString());
                $("#updatedAt").text(d.updatedAt ? new Date(d.updatedAt).toLocaleString() : "-");
            });
        }


        function deletePost() {

            let password = prompt("Input password:");
            if (!password) return;

            $.ajax({
                url: `http://localhost:8080/api/post/delete/${id}`,
                type: "DELETE",
                contentType: "application/json",
                data: JSON.stringify({ password }),

                success: function (res) {

                    if (res.code !== "0000") {
                        alert(res.message);
                        return;
                    }

                    alert(res.message);

                    setTimeout(() => {
                        window.location.href = "list.html";
                    }, 300);
                },

                error: function (xhr) {

                    let res = xhr.responseJSON;

                    if (res && res.message) {
                        alert(res.message);
                    } else {
                        alert("Terjadi error di server");
                    }
                }
            });
        }

        function goUpdate() {
            window.location.href = `update.html?id=${id}`;
        }

        loadDetail();
    </script>

</body>

</html>
